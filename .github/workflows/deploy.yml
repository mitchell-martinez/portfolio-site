name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            IMAGE_REPO="ghcr.io/${{ github.repository }}"
            IMAGE_SHA="$IMAGE_REPO:${{ github.sha }}"
            IMAGE_LATEST="$IMAGE_REPO:latest"

            # Pull the immutable image produced by this exact workflow run.
            docker pull "$IMAGE_SHA"
            # Keep :latest in sync for compose setups that reference it.
            docker tag "$IMAGE_SHA" "$IMAGE_LATEST"

            cd ~/portfolio-site
            docker compose up -d --force-recreate --no-deps portfolio-site
            docker compose ps portfolio-site
            docker image prune -f

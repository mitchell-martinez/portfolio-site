<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Designing a website that avoids user frustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b0a0a" />
      <stop offset="100%" stop-color="#9f1239" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f87171" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" />
  <circle cx="140" cy="130" r="220" fill="#ef4444" opacity="0.18" />
  <circle cx="1150" cy="610" r="270" fill="#f43f5e" opacity="0.14" />

  <rect x="120" y="110" width="1040" height="500" rx="28" fill="#26090e" opacity="0.78" />
  <rect x="120" y="110" width="1040" height="500" rx="28" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.72" />

  <rect x="220" y="220" width="840" height="50" rx="10" fill="#7f1d1d" opacity="0.78" />
  <rect x="220" y="296" width="620" height="26" rx="8" fill="#fca5a5" opacity="0.75" />
  <rect x="220" y="336" width="760" height="26" rx="8" fill="#fca5a5" opacity="0.65" />
  <rect x="220" y="392" width="300" height="78" rx="14" fill="#dc2626" opacity="0.88" />
  <rect x="540" y="392" width="520" height="78" rx="14" fill="#991b1b" opacity="0.78" />

  <text
    x="640"
    y="262"
    text-anchor="middle"
    fill="#fee2e2"
    font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="34"
    font-weight="650"
    letter-spacing="1.5"
  >USER EXPERIENCE BLUEPRINT</text>

  <text
    x="640"
    y="548"
    text-anchor="middle"
    fill="#fecaca"
    font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="42"
    font-weight="760"
    letter-spacing="-0.6"
  >Build websites that guide, not annoy</text>
</svg>

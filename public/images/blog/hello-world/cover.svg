    font-weight="600"
    letter-spacing="2"
  >CONTENT STRATEGY</text>

  <text
    x="640"
    y="360"
    text-anchor="middle"
    fill="#f8fafc"
    font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="54"
    font-weight="760"
    letter-spacing="-1"
  >Writing blog posts can significantly</text>

  <text
    x="640"
    y="435"
    text-anchor="middle"
    fill="#f8fafc"
    font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="54"
    font-weight="760"
    letter-spacing="-1"
  >increase visitors to your site</text>

  <text
    x="640"
    y="520"
    text-anchor="middle"
    fill="#93c5fd"
    font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"

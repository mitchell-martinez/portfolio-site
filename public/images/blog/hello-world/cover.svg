<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Writing blog posts can significantly increase visitors to your site">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#a3e635" />
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" />
  <circle cx="170" cy="120" r="220" fill="#38bdf8" opacity="0.15" />
  <circle cx="1170" cy="620" r="280" fill="#84cc16" opacity="0.12" />

  <rect x="120" y="110" width="1040" height="500" rx="28" fill="#0b1227" opacity="0.72" />
  <rect x="120" y="110" width="1040" height="500" rx="28" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.65" />

  <text
    x="640"
    y="260"
    text-anchor="middle"
    fill="#cbd5e1"
    font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
